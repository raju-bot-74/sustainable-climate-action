version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: climate_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-climate}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-climate123}
      POSTGRES_DB: ${DB_NAME:-sustainable_climate}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U climate"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - climate_network

  redis:
    image: redis:7-alpine
    container_name: climate_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - climate_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: climate_backend
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-climate}:${DB_PASSWORD:-climate123}@postgres:5432/${DB_NAME:-sustainable_climate}
      REDIS_URL: redis://redis:6379
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 5000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - climate_network
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: climate_frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://backend:5000/api
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - climate_network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  climate_network:
    driver: bridge
